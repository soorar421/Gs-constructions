<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Constructions - Advanced Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #1e8e3e; --tools: #9c27b0; --danger: #d93025; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f4; margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 20px; text-align: center; }
        .site-banner { background: #fffde7; padding: 12px; text-align: center; font-size: 20px; font-weight: bold; color: #f57f17; border-bottom: 3px solid #fbc02d; text-transform: uppercase; }
        .section-card { margin: 15px; padding: 15px; border-radius: 12px; background: #fff; border: 1px solid #e0e0e0; border-top: 4px solid var(--primary); }
        .section-title { font-size: 17px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--primary); }
        
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .search-box { background: #f8f9fa; border: 2px solid var(--tools); margin-bottom: 10px; }
        button { cursor: pointer; border: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-tools { background: var(--tools); color: white; }
        .btn-green { background: var(--secondary); color: white; }
        
        .summary-card { background: #e8f0fe; margin: 15px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; color: #666; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .date-badge { background: var(--dark); color: white; padding: 5px 12px; border-radius: 50px; font-size: 11px; margin-top: 15px; display: inline-block; }
        .btn-circle { width: 32px; height: 32px; border-radius: 50%; padding: 0; display: inline-flex; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1><i class="fas fa-hammer"></i> GS CONSTRUCTIONS</h1></div>
    <div id="login-section" style="padding: 80px 20px; text-align: center;">
        <button class="btn-main" onclick="login()" style="width: auto; padding: 15px 40px; border-radius: 30px;"><i class="fab fa-google"></i> Login with Google</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="site-banner" id="site-display">NO SITE SELECTED</div>
        <div class="summary-card">
            <span style="font-weight: bold; color: var(--primary);">TOTAL WEIGHT: <span id="grand-total">0.00</span> KG</span>
            <button onclick="logout()" class="btn-red" style="width: auto; padding: 5px 10px; margin:0; font-size:11px;">Logout</button>
        </div>

        <div class="section-card">
            <input type="text" id="site-name-input" placeholder="Enter Project Name..." oninput="updateSite()">
        </div>

        <div class="section-card" style="border-top-color: var(--tools);">
            <div class="section-title" style="color: var(--tools);"><i class="fas fa-toolbox"></i> Tools & Equipment</div>
            <input type="date" id="tool-date">
            
            <input type="text" id="tool-search" class="search-box" placeholder="🔍 Search Tool Name (e.g. Welding, Hammer...)" onkeyup="filterTools()">
            <select id="tool-select" size="5" style="height: 120px;">
                <option value="Chain Block">Chain Block</option>
                <option value="Welding Machine">Welding Machine</option>
                <option value="Gas Cutter">Gas Cutter</option>
                <option value="O2 Cylinder">O2 Cylinder</option>
                <option value="LPG Cylinder">LPG Cylinder</option>
                <option value="Welding Rod">Welding Rod</option>
                <option value="Grinding Machine">Grinding Machine</option>
                <option value="Drill Machine">Drill Machine</option>
                <option value="Impact Wrench">Impact Wrench</option>
                <option value="Safety Belt">Safety Belt (Full Body Harness)</option>
                <option value="Measuring Tape">Measuring Tape</option>
                <option value="Air Compressor">Air Compressor</option>
                </select>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="tool-id" placeholder="ID Number (e.g. QT 268)">
                <input type="number" id="tool-qty" placeholder="Qty" style="width: 80px;">
            </div>
            <button id="tool-btn" class="btn-tools" onclick="saveTool()"><i class="fas fa-save"></i> Save Tool Entry</button>
            <div id="tool-list-display"></div>
        </div>

        <div class="section-card">
            <div class="section-title"><i class="fas fa-cubes"></i> Material Log</div>
            <input type="date" id="mat-date">
            <select id="mat-type" onchange="togglePlate()">
                <option value="46">ISMB 300 (46 kg/m)</option>
                <option value="22.3">ISMC 200 (22.3 kg/m)</option>
                <option value="19.7">ISA 130 (19.7 kg/m)</option>
                <option value="78.5" data-type="plate">10mm Plate (78.5 kg/sq.m)</option>
                <option value="53.2" data-type="plate">CH Plate (53.2 kg/sq.m)</option>
            </select>
            <div id="plate-box" class="hidden"><input type="number" id="mat-width" placeholder="Width in MM"></div>
            <input type="number" id="mat-length" placeholder="Length in MM">
            <button id="mat-btn" class="btn-main" onclick="saveMaterial()"><i class="fas fa-plus"></i> Add Material</button>
            <div id="mat-list-display"></div>
        </div>

        <div class="section-card" style="border-top-color: var(--secondary);">
            <div class="section-title" style="color: var(--secondary);"><i class="fas fa-users"></i> Worker OT Log</div>
            <input type="date" id="work-date">
            <input type="text" id="worker-name" placeholder="Worker Name">
            <input type="number" id="worker-ot" placeholder="OT Hours">
            <button id="work-btn" class="btn-green" onclick="saveWorker()"><i class="fas fa-check"></i> Add Worker</button>
            <div id="worker-list-display"></div>
        </div>

        <button class="btn-main" onclick="generatePDF()" style="margin:20px; width:calc(100% - 40px); background:#333; height:55px;"><i class="fas fa-file-pdf"></i> DOWNLOAD FULL REPORT</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
        authDomain: "gsconstructions-3f4c9.firebaseapp.com",
        projectId: "gsconstructions-3f4c9",
        storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
        messagingSenderId: "622430516475",
        appId: "1:622430516475:web:17fd96908472cbd665ec5e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let editT = null, editM = null, editW = null;

    function login() { auth.signInWithPopup(provider); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tool-date').value = today;
            document.getElementById('mat-date').value = today;
            document.getElementById('work-date').value = today;
            loadData();
        }
    });

    function filterTools() {
        let input = document.getElementById('tool-search').value.toLowerCase();
        let options = document.getElementById('tool-select').options;
        for (let opt of options) {
            opt.style.display = opt.text.toLowerCase().includes(input) ? "" : "none";
        }
    }

    function togglePlate() {
        const isP = document.getElementById('mat-type').options[document.getElementById('mat-type').selectedIndex].getAttribute('data-type') === 'plate';
        document.getElementById('plate-box').classList.toggle('hidden', !isP);
    }

    function updateSite() {
        let val = document.getElementById('site-name-input').value;
        document.getElementById('site-display').innerText = val || "NO SITE SELECTED";
        localStorage.setItem('gs_pro_site', val);
    }

    async function saveTool() {
        const date = document.getElementById('tool-date').value;
        const name = document.getElementById('tool-select').value;
        const idNo = document.getElementById('tool-id').value;
        const qty = document.getElementById('tool-qty').value;
        if(!name || !qty) return alert("Select Tool and Qty");

        const data = { date, name, idNo, qty, uid: auth.currentUser.uid, ts: Date.now() };
        if(editT) { await db.collection('tools').doc(editT).update(data); editT = null; }
        else { await db.collection('tools').add(data); }
        loadData();
    }

    async function saveMaterial() {
        const date = document.getElementById('mat-date').value;
        const sel = document.getElementById('mat-type');
        const len = parseFloat(document.getElementById('mat-length').value);
        if(!len) return alert("Enter Length");

        let wt = 0, sz = len + "mm";
        if(sel.options[sel.selectedIndex].getAttribute('data-type') === 'plate') {
            const wid = parseFloat(document.getElementById('mat-width').value);
            wt = ((len/1000)*(wid/1000)*parseFloat(sel.value)).toFixed(2);
            sz = len + "x" + wid + "mm";
        } else { wt = ((len/1000)*parseFloat(sel.value)).toFixed(2); }

        const data = { date, name: sel.options[sel.selectedIndex].text, size: sz, weight: parseFloat(wt), uid: auth.currentUser.uid, ts: Date.now() };
        if(editM) { await db.collection('materials').doc(editM).update(data); editM = null; }
        else { await db.collection('materials').add(data); }
        loadData();
    }

    async function saveWorker() {
        const date = document.getElementById('work-date').value;
        const name = document.getElementById('worker-name').value;
        const ot = document.getElementById('worker-ot').value;
        if(!name) return alert("Enter Name");

        const data = { date, name, ot, uid: auth.currentUser.uid, ts: Date.now() };
        if(editW) { await db.collection('workers').doc(editW).update(data); editW = null; }
        else { await db.collection('workers').add(data); }
        loadData();
    }

    async function deleteDoc(col, id) { if(confirm("Delete?")) { await db.collection(col).doc(id).delete(); loadData(); } }

    async function loadData() {
        const uid = auth.currentUser.uid;
        document.getElementById('site-name-input').value = localStorage.getItem('gs_pro_site') || "";
        updateSite();

        // Load Tools (Grouped)
        const tSnap = await db.collection('tools').where('uid', '==', uid).get();
        const tGroup = {};
        tSnap.forEach(d => { 
            const data = d.data();
            if(!tGroup[data.date]) tGroup[data.date] = [];
            tGroup[data.date].push({id: d.id, ...data});
        });
        let tH = '';
        Object.keys(tGroup).sort().reverse().forEach(date => {
            tH += `<div class="date-badge">${date}</div><table>`;
            tGroup[date].forEach(t => {
                tH += `<tr><td>${t.name} (${t.idNo})</td><td style="width:40px;">Q:${t.qty}</td>
                <td style="width:80px;"><button class="btn-circle btn-tools" onclick="editT='${t.id}'"><i class="fas fa-edit"></i></button>
                <button class="btn-circle btn-red" onclick="deleteDoc('tools','${t.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            tH += `</table>`;
        });
        document.getElementById('tool-list-display').innerHTML = tH;

        // Materials & Workers (Same as before)
        const mSnap = await db.collection('materials').where('uid', '==', uid).get();
        let mH = '<table>', totW = 0;
        mSnap.forEach(d => { const data = d.data(); totW += data.weight; mH += `<tr><td>${data.name}</td><td>${data.weight}kg</td><td><button class="btn-circle btn-red" onclick="deleteDoc('materials','${d.id}')">X</button></td></tr>`; });
        document.getElementById('mat-list-display').innerHTML = mH + '</table>';
        document.getElementById('grand-total').innerText = totW.toFixed(2);
        
        // Similar logic for workers grouping...
    }
</script>
</body>
</html>
