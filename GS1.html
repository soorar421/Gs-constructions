<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Constructions - Smart Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #1e8e3e; --danger: #d93025; --warning: #f9ab00; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 26px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .section-card { background: #ffffff; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-top: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button { cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; }
        .btn-add { background: var(--primary); color: white; }
        .btn-edit { background: var(--warning); color: white; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-del { background: var(--danger); color: white; width: auto; padding: 5px 10px; font-size: 12px; }
        .total-badge { background: #e8f0fe; color: var(--primary); padding: 10px; border-radius: 10px; font-weight: bold; text-align: center; margin: 10px 0; font-size: 18px; border: 1px dashed var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #f8f9fa; color: #555; }
        .date-header { background: var(--primary); color: white; padding: 8px 15px; margin-top: 20px; border-radius: 10px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; }
        .action-btns { display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-helmet-safety"></i> GS CONSTRUCTIONS</h1>
    
    <div id="login-section" style="text-align: center; padding: 60px 0;">
        <button onclick="login()" class="btn-add" style="width: auto; padding: 15px 40px;"><i class="fab fa-google"></i> Login with Google</button>
    </div>

    <div id="main-content" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 12px;">
            <span id="user-name" style="font-weight: bold; color: var(--primary);"><i class="fas fa-user-circle"></i></span>
            <button onclick="logout()" class="btn-del" style="margin:0;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="section-card">
            <h3><i class="fas fa-truck-loading" style="color:var(--primary)"></i> 1. Material Entry</h3>
            <input type="date" id="mat-date">
            <select id="mat-type" onchange="togglePlateFields()">
                <option value="46" data-type="linear">ISMB 300 (46 kg/m)</option>
                <option value="22.3" data-type="linear">ISMC 200 (22.3 kg/m)</option>
                <option value="78.5" data-type="plate">10mm Plate (78.5 kg/sq.m)</option>
                <option value="47.1" data-type="plate">6mm Plate (47.1 kg/sq.m)</option>
            </select>
            <div id="plate-dims" class="hidden">
                <input type="number" id="mat-width" placeholder="Width in MM">
            </div>
            <input type="number" id="mat-length" placeholder="Length in MM">
            <button onclick="addMaterial()" class="btn-add" id="mat-btn"><i class="fas fa-plus"></i> Add Material</button>
            
            <div class="total-badge" id="total-weight-display">Total Weight: 0.00 KG</div>
            <div id="mat-list-container"></div>
        </div>

        <div class="section-card" style="border-top-color: var(--secondary);">
            <h3><i class="fas fa-users" style="color:var(--secondary)"></i> 2. Worker OT List</h3>
            <input type="date" id="work-date">
            <input type="text" id="worker-name" placeholder="Worker Name">
            <input type="number" id="ot-hours" placeholder="OT Hours">
            <button onclick="addWorker()" class="btn-add" id="work-btn" style="background:var(--secondary)"><i class="fas fa-user-plus"></i> Add Worker</button>
            <div id="worker-list-container"></div>
        </div>

        <button onclick="generatePDF()" class="btn-green" style="background:var(--secondary);"><i class="fas fa-file-pdf"></i> Download Report</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
        authDomain: "gsconstructions-3f4c9.firebaseapp.com",
        projectId: "gsconstructions-3f4c9",
        storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
        messagingSenderId: "622430516475",
        appId: "1:622430516475:web:17fd96908472cbd665ec5e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore(), provider = new firebase.auth.GoogleAuthProvider();

    let editId = null;

    function login() { auth.signInWithPopup(provider); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-name').innerHTML = `<i class="fas fa-user"></i> ${user.displayName}`;
            loadData();
        }
    });

    function togglePlateFields() {
        const type = document.getElementById('mat-type').options[document.getElementById('mat-type').selectedIndex].getAttribute('data-type');
        document.getElementById('plate-dims').classList.toggle('hidden', type !== 'plate');
    }

    async function addMaterial() {
        const date = document.getElementById('mat-date').value, sel = document.getElementById('mat-type'), len = parseFloat(document.getElementById('mat-length').value);
        if (!len || !date) return alert("Fill all fields");
        let wt = 0, size = len + "mm", width = 0;
        if (sel.options[sel.selectedIndex].getAttribute('data-type') === 'plate') {
            width = parseFloat(document.getElementById('mat-width').value);
            wt = ((len/1000)*(width/1000)*parseFloat(sel.value)).toFixed(2);
            size = `${len}x${width}mm`;
        } else { wt = ((len/1000)*parseFloat(sel.value)).toFixed(2); }

        const data = { date, name: sel.options[sel.selectedIndex].text, size, weight: parseFloat(wt), uid: auth.currentUser.uid, ts: Date.now(), rawLen: len, rawWidth: width, typeVal: sel.value };
        
        if(editId) { await db.collection('materials').doc(editId).update(data); editId = null; document.getElementById('mat-btn').innerHTML = '<i class="fas fa-plus"></i> Add Material'; }
        else { await db.collection('materials').add(data); }
        loadData();
    }

    async function addWorker() {
        const date = document.getElementById('work-date').value, name = document.getElementById('worker-name').value, ot = document.getElementById('ot-hours').value;
        if (!date || !name) return alert("Fill details");
        const data = { date, name, ot, uid: auth.currentUser.uid, ts: Date.now() };
        if(editId) { await db.collection('workers').doc(editId).update(data); editId = null; document.getElementById('work-btn').innerHTML = '<i class="fas fa-user-plus"></i> Add Worker'; }
        else { await db.collection('workers').add(data); }
        loadData();
    }

    async function editItem(col, id, type) {
        editId = id;
        const doc = await db.collection(col).doc(id).get();
        const d = doc.data();
        if(type === 'mat') {
            document.getElementById('mat-date').value = d.date;
            document.getElementById('mat-length').value = d.rawLen;
            document.getElementById('mat-type').value = d.typeVal;
            if(d.rawWidth > 0) { document.getElementById('mat-width').value = d.rawWidth; togglePlateFields(); }
            document.getElementById('mat-btn').innerHTML = '<i class="fas fa-save"></i> Update Material';
        } else {
            document.getElementById('work-date').value = d.date;
            document.getElementById('worker-name').value = d.name;
            document.getElementById('ot-hours').value = d.ot;
            document.getElementById('work-btn').innerHTML = '<i class="fas fa-save"></i> Update Worker';
        }
        window.scrollTo(0,0);
    }

    async function deleteItem(col, id) { if(confirm("Delete?")) { await db.collection(col).doc(id).delete(); loadData(); } }

    async function loadData() {
        const uid = auth.currentUser.uid;
        const mSnap = await db.collection('materials').where('uid', '==', uid).get();
        let matHTML = '<table><thead><tr><th>Item</th><th>Size</th><th>KG</th><th>Actions</th></tr></thead><tbody>', totalWt = 0;
        mSnap.forEach(doc => {
            const d = doc.data(); totalWt += d.weight;
            matHTML += `<tr><td>${d.name}</td><td>${d.size}</td><td>${d.weight}</td><td class="action-btns"><button class="btn-edit" onclick="editItem('materials','${doc.id}','mat')"><i class="fas fa-edit"></i></button><button class="btn-del" onclick="deleteItem('materials','${doc.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        document.getElementById('mat-list-container').innerHTML = matHTML + '</tbody></table>';
        document.getElementById('total-weight-display').innerText = `Total Material Weight: ${totalWt.toFixed(2)} KG`;

        const wSnap = await db.collection('workers').where('uid', '==', uid).get();
        const grouped = {}; wSnap.forEach(doc => { const d = doc.data(); if (!grouped[d.date]) grouped[d.date] = []; grouped[d.date].push({id: doc.id, ...d}); });
        let workHTML = '';
        Object.keys(grouped).sort().reverse().forEach(date => {
            workHTML += `<div class="date-header">${date}</div><table><tbody>`;
            grouped[date].forEach(w => { workHTML += `<tr><td>${w.name}</td><td>OT: ${w.ot}</td><td class="action-btns"><button class="btn-edit" onclick="editItem('workers','${w.id}','work')"><i class="fas fa-edit"></i></button><button class="btn-del" onclick="deleteItem('workers','${w.id}')"><i class="fas fa-trash"></i></button></td></tr>`; });
            workHTML += `</tbody></table>`;
        });
        document.getElementById('worker-list-container').innerHTML = workHTML;
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(18); doc.setTextColor(26, 115, 232); doc.text("GS CONSTRUCTIONS SITE REPORT", 14, 20);
        doc.autoTable({ html: '#mat-list-container table', startY: 30, headStyles: {fillColor: [26, 115, 232]} });
        doc.save("GS_Site_Report.pdf");
    }
</script>
</body>
</html>
